name: Publish to MCP Registry

# GitHub OIDC from a workflow in the viralnote org grants the
# io.github.viralnote/* registry namespace directly — no user OAuth token,
# so org-membership/token-grant issues can't 403 the publish.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [server.json]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher

      - name: Login via GitHub OIDC
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
